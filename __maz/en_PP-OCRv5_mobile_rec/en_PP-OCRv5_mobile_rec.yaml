Global:
  model_name: en_PP-OCRv5_mobile_rec # To use static model for inference.
  debug: false
  use_gpu: true
  epoch_num: 20
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: ./output/v5_en_mobile_2026_1_14
  save_epoch_step: 1
  eval_batch_step: [0, 150]
  cal_metric_during_train: true
  pretrained_model:
  checkpoints:
  save_inference_dir:
  use_visualdl: false
  infer_img:
  character_dict_path: ./ppocr/utils/dict/ppocrv5_en_dict.txt
  max_text_length: &max_text_length 30
  infer_mode: false
  use_space_char: true
  distributed: false
  save_res_path: ./output/rec/predicts_en_ppocrv5.txt
  d2s_train_image_shape: [3, 48, 320]


Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0005
    warmup_epoch: 0
  regularizer:
    name: L2
    factor: 3.0e-05


Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: PPLCNetV3
    scale: 0.95
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 120
            depth: 2
            hidden_dims: 120
            kernel_size: [1, 3]
            use_guide: True
          Head:
            fc_decay: 0.00001
      - NRTRHead:
          nrtr_dim: 384
          max_text_length: *max_text_length

Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
    - NRTRLoss:

PostProcess:  
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: False

Train:
  dataset:
    name: MazDataset
    data_dir: d:/projects/dataset-words-OCR/
    ext_data_num: 2
    ratio: [0., 1.]
    max_limit_per_dataset:
      "*": 130000
    #static_mode_save_final: d:/projects/dataset-words-OCR/all-paddle.TRAIN.pkl
    ext_op_transform_idx: 1
    label_file_list:
    - ./train_data/train_list.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - MazCombineWordImages:  # MUST be before encoding/resizing
        prob: 0.5
        min_words: 2
        max_words: 4
        space_range: [10, 20]
        pad_color: 255
    - RecConAug:
        prob: 0.15
        ext_data_num: 2
        image_shape: [48, 320, 3]
        max_text_length: *max_text_length
    - RecAug:
    - MultiLabelEncode:
        gtc_encode: NRTRLabelEncode
    - RecResizeImg:
        image_shape: [3, 48, 320]
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_gtc
        - length
        - valid_ratio
  #sampler:
  #  name: MultiScaleSampler
  #  scales: [[320, 32], [320, 48], [320, 64]]
  #  first_bs: &bs 128
  #  fix_bs: false
  #  divided_factor: [8, 16] # w, h
  #  is_training: True
  loader:
    # batch_size_per_card: *bs
    # shuffle: true
    # use false if dynamic cache is enabled
    shuffle: false
    batch_size_per_card: 128
    drop_last: true
    num_workers: 0
Eval:
  dataset:
    name: MazDataset
    data_dir: d:/projects/dataset-words-OCR/
    ext_data_num: 2
    data_dir_exclude:
      - __woec.ICDAR2013.json.PAD.FILTERED.json
    ratio: [0.0, 1.0]
    #static_mode_save_final: d:/projects/dataset-words-OCR/all-paddle.EVAL.pkl
    max_limit_per_dataset:
      "*": 2500
      "__woec.IBedits.json.PAD.FILTERED.json": 10000
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - MazCombineWordImages:  # MUST be before encoding/resizing
        prob: 0.5
        min_words: 2
        max_words: 4
        space_range: [10, 20]
        pad_color: 255
    - MultiLabelEncode:
        gtc_encode: NRTRLabelEncode
    - RecResizeImg:
        image_shape: [3, 48, 320]
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_gtc
        - length
        - valid_ratio
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 64
    num_workers: 0
