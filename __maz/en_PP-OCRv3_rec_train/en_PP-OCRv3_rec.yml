Global:
  debug: false
  use_gpu: true
  epoch_num: 200
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: ./output/v3_en_mobile_2024.04.02
  save_epoch_step: 1
  eval_batch_step: [0, 150]
  cal_metric_during_train: true
  pretrained_model:
  checkpoints:
  save_inference_dir:
  use_visualdl: false
  infer_img: doc/imgs_words/ch/word_1.jpg
  character_dict_path: ppocr/utils/en_dict.txt
  max_text_length: &max_text_length 30
  infer_mode: false
  use_space_char: true
  distributed: false
  save_res_path: ./output/rec/predicts_ppocrv3_en.txt
  use_wandb: true


Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.001
    warmup_epoch: 0
#  lr:
#    name: Piecewise
#    decay_epochs : [700]
#    values : [0.001, 0.0001]
#    warmup_epoch: 5
  regularizer:
    name: L2
    factor: 1.0e-04


Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform:
  Backbone:
    name: MobileNetV1Enhance
    scale: 0.5
    last_conv_stride: [1, 2]
    last_pool_type: avg
    last_pool_kernel_size: [2, 2]
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 64
            depth: 2
            hidden_dims: 120
            use_guide: True
          Head:
            fc_decay: 0.00001
      - SARHead:
          enc_dim: 512
          max_text_length: *max_text_length

Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
    - SARLoss:

PostProcess:  
  name: CTCLabelDecode

Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: False

Train:
  dataset:
    name: MazDataset
    # data_dir: c:/data/woec_dataset/multi/__woec.IBedits.json.PAD.FILTERED.json
    data_dir: c:/data/woec_dataset/multi/
    ratio: [0., 1.]
    max_limit_per_dataset:
      "*": 250000
    static_mode_save_final: c:/data/woec_dataset/multi/all-paddle.TRAIN.pkl
#    dynamic_cache: true
#    dynamic_cache_workers: 2
#    dynamic_mode_verbose: 1
#    dynamic_cache_prefetch: 2048
    ext_op_transform_idx: 1
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - RecConAug:
        prob: 0.15
        ext_data_num: 2
        image_shape: [48, 320, 3]
        max_text_length: *max_text_length
    - RecAug:
    - MultiLabelEncode:
    - RecResizeImg:
        image_shape: [3, 48, 320]
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_sar
        - length
        - valid_ratio
  loader:
    # shuffle: true
    # use false if dynamic cache is enabled
    shuffle: false
    batch_size_per_card: 128
    drop_last: true
    num_workers: 0  # not supported on windows

Eval:
  dataset:
    name: MazDataset
#    data_dir: c:/data/woec_dataset/multi/__woec.funSD.json.PAD.FILTERED.json
    # data_dir: c:/data/woec_dataset/multi/__woec.IBedits.json.PAD.FILTERED.json
    # data_dir: c:/data/woec_dataset/multi/__woec.ICDAR2013.json.PAD.FILTERED.json
    data_dir: c:/data/woec_dataset/multi/
    data_dir_exclude:
      - __woec.ICDAR2013.json.PAD.FILTERED.json
    ratio: [0.0, 1.0]
    static_mode_save_final: c:/data/woec_dataset/multi/all-paddle.EVAL.pkl
#    dynamic_cache: true
#    dynamic_cache_workers: 1
#    dynamic_mode_verbose: 0
#    dynamic_cache_prefetch: 8196
    max_limit_per_dataset:
      "*": 2500
      "__woec.IBedits.json.PAD.FILTERED.json": 10000
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - MultiLabelEncode:
    - RecResizeImg:
        image_shape: [3, 48, 320]
    - KeepKeys:
        keep_keys:
        - image
        - label_ctc
        - label_sar
        - length
        - valid_ratio
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 64
    num_workers: 0
